<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti, mi amor 🌹</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="petals" id="petals"></div>

  <header class="hero">
    <h1 class="title">Para ti, mi amor</h1>
    <p class="subtitle">Aunque no esté contigo esta semana, cada día tendrás un pedacito de mí 🌹</p>
    <div class="countdown" id="countdown"></div>
  </header>

  <main class="grid" id="grid"></main>

  <footer class="footer">
    <p>Hecho con todo mi corazón 💌</p>
  </footer>

  <!-- Modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="close-btn" id="closeBtn" aria-label="Cerrar">×</button>
      <div class="flower-decoration">🌹</div>
      <h2 class="modal-day" id="modalDay"></h2>
      <p class="modal-message" id="modalMessage"></p>
      <div class="hearts" id="hearts"></div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
